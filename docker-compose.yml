version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: event-db
    restart: always
    environment:
      MYSQL_DATABASE: event_booking_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/src/models/dbInit.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: event-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: event_booking_db
      PORT: 5000
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: event-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
